<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Banner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a; /* Dunkler Hintergrund */
        }
        .banner-container {
            max-width: 100%;
            height: auto;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 4px; /* Leicht abgerundete Ecken */
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <!-- Wichtig: Alles kleingeschrieben wie dein Dateiname -->
        <img src="banner.png" alt="Server Banner">
    </div>

</body>
</html>
